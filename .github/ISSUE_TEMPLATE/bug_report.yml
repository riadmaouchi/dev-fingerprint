name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: command
    attributes:
      label: Command run
      placeholder: "e.g. devfp analyze gaearon --commits 200"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / error output
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.5"
