name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/devfp/

      - name: Run tests
        run: uv run pytest tests/ -v --cov=devfp --cov-report=term-missing

  demo:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run demo (no token needed)
        run: |
          if [ -d "reports/sample" ] && [ "$(ls -A reports/sample/*.json 2>/dev/null)" ]; then
            uv run devfp demo
          else
            echo "No sample profiles yet — skipping demo"
          fi

      - name: List configured developers
        run: uv run devfp list
